{{ define "main" }}

<main class="page-shell">

  {{ partial "mini-highlights.html" . }}

  {{ range .Params.sections }}
    <section id="{{ .id }}" class="content-section">

      <h2 class="section-title">{{ .title }}</h2>

      <div class="publication-list">
        {{ range .projects }}
          <article id="{{ .id }}" class="publication-card">

            <h3 class="project-title">{{ .title }}</h3>

            {{ with .summary }}
              <p>{{ . }}</p>
            {{ end }}

            {{ with .link }}
              <p>
                <a href="{{ . }}" target="_blank" rel="noopener" class="link dim">
                  View publication →
                </a>
              </p>
            {{ end }}

          </article>
        {{ end }}
      </div>

    </section>
  {{ end }}

  <section class="mt5">
    {{ .Content }}
  </section>

</main>

{{ end }}
